<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Evidências TMA</title>

<style>
:root{
--bg:#f6f7f9;
--card:#fff;
--border:#e5e7eb;
--text:#111827;
--muted:#6b7280;
--okbg:#e9f7ef;
--okbd:#b7e1cd;
--errbg:#fdecea;
--errbd:#f5c6cb;
}

html,body{
height:100%;
margin:0;
padding:0;
background:var(--bg);
color:var(--text);
font-family:Arial;
}

.appbar{
position:sticky;
top:0;
background:var(--card);
border-bottom:1px solid var(--border);
padding:12px 14px;
}

.title{
font-size:18px;
font-weight:900;
}

.wrap{
padding:12px;
}

.card{
width:100%;
max-width:820px;
margin:0 auto;
background:#fff;
border:1px solid var(--border);
border-radius:16px;
padding:14px;
}

label{
display:block;
margin-top:12px;
font-weight:900;
}

select,input,textarea{
width:100%;
padding:16px;
margin-top:6px;
border-radius:12px;
border:1px solid var(--border);
font-size:16px;
box-sizing:border-box;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

@media (max-width:560px){
.row{grid-template-columns:1fr;}
}

#sendBtn{
width:100%;
margin-top:14px;
padding:18px;
border-radius:14px;
border:0;
background:#111827;
color:white;
font-weight:900;
font-size:16px;
cursor:pointer;
}

.status{
margin-top:12px;
padding:12px;
border-radius:12px;
display:none;
}

.status.ok{
background:var(--okbg);
border:1px solid var(--okbd);
display:block;
}

.status.err{
background:var(--errbg);
border:1px solid var(--errbd);
display:block;
}
</style>
</head>

<body>

<div class="appbar">
  <div class="title">Evidências TMA</div>
</div>

<div class="wrap">
  <div class="card">

    <div class="row">
      <div>
        <label>CPF *</label>
        <input id="cpf" inputmode="numeric">
      </div>

      <div>
        <label>Torcedor é sócio?</label>
        <select id="socio">
          <option value="">Selecione</option>
          <option>Sim</option>
          <option>Não</option>
        </select>
      </div>
    </div>

    <label>Setor de atendimento</label>
    <select id="setorAtendimento">
      <option value="">Selecione</option>
      <option>Leste superior</option>
      <option>Leste inferior</option>
      <option>Leste EDG</option>
      <option>Norte</option>
      <option>Sul</option>
      <option>Camarote leste</option>
      <option>3º andar oeste</option>
      <option>3º andar oeste nível zero</option>
      <option>Firezone</option>
      <option>Star Kids</option>
      <option>Tribuna</option>
      <option>Oeste inferior</option>
      <option>Oeste superior A</option>
      <option>Oeste superior B</option>
    </select>

    <label>Tipo de ingresso</label>
    <select id="tipoIngresso">
      <option value="">Selecione</option>
      <option>Sócio</option>
      <option>Acompanhante glorioso</option>
      <option>Gratuidade</option>
      <option>Inteira</option>
      <option>Meia-entrada</option>
      <option>Cortesia</option>
    </select>

    <label>Problema</label>
    <select id="problema" onchange="toggleOutro()">
      <option value="">Selecione</option>
      <option>Facial negada-não localizado na contingência</option>
      <option>Orientações</option>
      <option>Resgate de link</option>
      <option>Criança sem cadastro</option>
      <option>Ingresso com cadeado-transferência não habilitada</option>
      <option>Troca de setor</option>
      <option>Outro</option>
    </select>

    <div id="outroBox" style="display:none;">
      <label>Descreva o problema (Outro) *</label>
      <textarea id="problemaOutroDesc"></textarea>
    </div>

    <div class="row">
      <div>
        <label>Resolução</label>
        <select id="resolucao" onchange="toggleEvidencia()">
          <option value="">Selecione</option>
          <option>Master branco</option>
          <option>Master preto</option>
          <option>Orientação</option>
        </select>
      </div>

      <div>
        <label>Atendente</label>
        <input id="atendente">
      </div>
    </div>

    <label>Observações</label>
    <textarea id="observacoes"></textarea>

    <div id="evidenciaBox" style="display:none;">
      <label>Foto/print *</label>
      <input id="file" type="file" accept="image/*">
    </div>

    <button id="sendBtn" onclick="send()">Enviar</button>

    <div id="status" class="status"></div>

  </div>
</div>

<script>
const API_URL = "COLE_AQUI_SEU_EXEC";

function setStatus(msg,ok){
  const el=document.getElementById("status");
  el.className="status "+(ok?"ok":"err");
  el.textContent=msg;
}

function onlyDigits(s){
  return (s||"").replace(/\D+/g,"");
}

function toggleOutro(){
  const problema=document.getElementById("problema").value;
  const box=document.getElementById("outroBox");

  if(problema==="Outro"){
    box.style.display="block";
  }else{
    box.style.display="none";
    document.getElementById("problemaOutroDesc").value="";
  }
}

function toggleEvidencia(){
  const resolucao=document.getElementById("resolucao").value;
  const box=document.getElementById("evidenciaBox");

  if(resolucao==="Master branco" || resolucao==="Master preto"){
    box.style.display="block";
  }else{
    box.style.display="none";
    document.getElementById("file").value="";
  }
}

document.addEventListener("DOMContentLoaded", () => {
  toggleOutro();
  toggleEvidencia();
});

async function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result.split(",")[1]);
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

async function send(){

  const cpf=onlyDigits(document.getElementById("cpf").value);
  const setorAtendimento=document.getElementById("setorAtendimento").value;
  const socio=document.getElementById("socio").value;
  const tipoIngresso=document.getElementById("tipoIngresso").value;
  const problema=document.getElementById("problema").value;
  const problemaOutroDesc=document.getElementById("problemaOutroDesc").value.trim();
  const resolucao=document.getElementById("resolucao").value;
  const atendente=document.getElementById("atendente").value;
  const observacoes=document.getElementById("observacoes").value;

  const fileInput=document.getElementById("file");
  const precisaEvidencia=(resolucao==="Master branco" || resolucao==="Master preto");

  if(precisaEvidencia && fileInput.files.length===0){
    setStatus("Envie a evidência.",false);
    return;
  }

  if(problema==="Outro" && !problemaOutroDesc){
    setStatus("Descreva o problema em 'Outro'.",false);
    return;
  }

  let payload={
    cpf,
    setorAtendimento,
    socio,
    tipoIngresso,
    problema,
    problemaOutroDesc,
    resolucao,
    atendente,
    observacoes
  };

  if(precisaEvidencia){
    const file=fileInput.files[0];
    const base64=await fileToBase64(file);

    payload.fileName=file.name;
    payload.mimeType=file.type;
    payload.base64Data=base64;
  }

  try{
    await fetch(API_URL,{
      method:"POST",
      headers:{ "Content-Type":"text/plain" },
      body:JSON.stringify(payload)
    });

    setStatus("Enviado com sucesso",true);

    document.getElementById("cpf").value="";
    document.getElementById("socio").value="";
    document.getElementById("setorAtendimento").value="";
    document.getElementById("tipoIngresso").value="";
    document.getElementById("problema").value="";
    document.getElementById("problemaOutroDesc").value="";
    document.getElementById("resolucao").value="";
    document.getElementById("atendente").value="";
    document.getElementById("observacoes").value="";
    document.getElementById("file").value="";

    toggleOutro();
    toggleEvidencia();

  }catch(e){
    setStatus("Falha ao enviar",false);
  }
}
</script>

</body>
</html>
