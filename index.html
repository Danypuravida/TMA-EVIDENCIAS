<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Evidências TMA</title>

    <style>
      :root{
        --bg:#f6f7f9; --card:#fff; --border:#e5e7eb; --text:#111827; --muted:#6b7280;
        --okbg:#e9f7ef; --okbd:#b7e1cd; --errbg:#fdecea; --errbd:#f5c6cb;
      }
      html,body{height:100%;margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif;}
      .appbar{position:sticky;top:0;z-index:10;background:var(--card);border-bottom:1px solid var(--border);padding:12px 14px;}
      .appbar .title{font-size:18px;font-weight:900;margin:0;}
      .appbar .subtitle{margin:6px 0 0 0;color:var(--muted);font-size:13px;line-height:1.3;}
      .wrap{padding:12px;}
      .card{width:100%;max-width:820px;margin:0 auto;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;box-sizing:border-box;}
      @media (max-width:560px){.wrap{padding:0}.card{max-width:none;border-left:0;border-right:0;border-radius:0;padding:14px}}
      label{display:block;margin-top:12px;font-weight:900;font-size:14px;}
      small{color:var(--muted);display:block;margin-top:6px;font-size:12.5px;line-height:1.3;}
      select,input,textarea{width:100%;padding:16px;margin-top:6px;box-sizing:border-box;font-size:16px;border-radius:12px;border:1px solid var(--border);background:#fff;}
      textarea{min-height:96px;resize:vertical;}
      .row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
      @media (max-width:560px){.row{grid-template-columns:1fr}}
      .status{margin-top:12px;padding:12px;border-radius:12px;font-size:14px;line-height:1.35;display:none;}
      .status.ok{background:var(--okbg);border:1px solid var(--okbd);display:block;}
      .status.err{background:var(--errbg);border:1px solid var(--errbd);display:block;}
      .sticky-actions{position:sticky;bottom:0;background:linear-gradient(to top, rgba(246,247,249,1), rgba(246,247,249,0));padding-top:10px;margin-top:8px;}

      /* Botão principal (somente Enviar) */
      #sendBtn{
        width:100%;
        cursor:pointer;
        font-weight:900;
        border:0;
        margin-top:14px;
        padding:18px;
        border-radius:14px;
        background:#111827;
        color:#fff;
        font-size:16px;
      }
      #sendBtn:disabled{opacity:.7;cursor:not-allowed;}

      /* ===== Botões rápidos de Problema ===== */
      .chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;}
      #problemChips .chip{
        width:auto;               /* importante: não virar botão gigante */
        border:1px solid var(--border);
        background:#fff;
        color:#111827;
        padding:12px 14px;
        border-radius:999px;
        font-weight:900;
        font-size:14px;
        line-height:1;
        cursor:pointer;
        user-select:none;
      }
      #problemChips .chip:active{transform:scale(0.98);}
      #problemChips .chip.selected{background:#111827;color:#fff;border-color:#111827;}
      #problemChips .chip.secondary{background:#f3f4f6;}
      @media (max-width:560px){#problemChips .chip{padding:14px 14px;font-size:14px;}}
    </style>
  </head>

  <body>
    <div class="appbar">
      <div class="title">Evidências TMA</div>
      <div class="subtitle">Informações de atendimentos.</div>
    </div>

    <div class="wrap">
      <div class="card">

        <div class="row">
          <div>
            <label>CPF do torcedor *</label>
            <input id="cpf" inputmode="numeric" placeholder="Somente números" />
            <small>Ex: 12345678900</small>
          </div>
          <div>
            <label>Torcedor é sócio? *</label>
            <select id="socio">
              <option value="">Selecione...</option>
              <option>Sim</option>
              <option>Não</option>
            </select>
          </div>
        </div>

        <label>Setor de atendimento *</label>
        <select id="setorAtendimento">
          <option value="">Selecione...</option>
          <option>Leste superior</option>
          <option>Leste inferior</option>
          <option>Leste EDG</option>
          <option>Norte</option>
          <option>Sul</option>
          <option>Camarote leste</option>
          <option>3º andar oeste</option>
          <option>3º andar oeste nível zero</option>
          <option>Firezone</option>
          <option>Star Kids</option>
          <option>Tribuna</option>
          <option>Oeste inferior</option>
          <option>Oeste superior A</option>
          <option>Oeste superior B</option>
        </select>

        <label>Tipo de ingresso *</label>
        <select id="tipoIngresso">
          <option value="">Selecione...</option>
          <option>Sócio</option>
          <option>Acompanhante glorioso</option>
          <option>Gratuidade</option>
          <option>Inteira</option>
          <option>Meia-entrada</option>
          <option>Cortesia</option>
        </select>

        <label>Problema *</label>
        <small>Preferencialmente use os botões (mais rápido). Se precisar, use o dropdown.</small>

        <div class="chips" id="problemChips">
          <button type="button" class="chip" data-value="Facial negada-não localizado na contingência">Facial negada - Não localizado</button>
          <button type="button" class="chip" data-value="Resgate de link">Resgate de link</button>
          <button type="button" class="chip" data-value="Ingresso com cadeado-transferência não habilitada">Cadeado</button>
          <button type="button" class="chip" data-value="Criança sem cadastro">Criança sem cadastro</button>
          <button type="button" class="chip" data-value="Troca de setor">Troca de setor</button>
          <button type="button" class="chip" data-value="Orientações">Orientações</button>
          <button type="button" class="chip secondary" data-value="Outro">Outro</button>
        </div>

        <select id="problema" onchange="toggleOutro()">
          <option value="">Selecione...</option>
          <option>Facial negada-não localizado na contingência</option>
          <option>Orientações</option>
          <option>Resgate de link</option>
          <option>Criança sem cadastro</option>
          <option>Ingresso com cadeado-transferência não habilitada</option>
          <option>Troca de setor</option>
          <option>Outro</option>
        </select>

        <div id="outroBox" style="display:none;">
          <label>Descreva o problema (Outro) *</label>
          <textarea id="problemaOutroDesc" placeholder="Descreva rapidamente..."></textarea>
        </div>

        <div class="row">
          <div>
            <label>Resolução *</label>
            <select id="resolucao">
              <option value="">Selecione...</option>
              <option>Master branco</option>
              <option>Master preto</option>
              <option>Orientação</option>
            </select>
          </div>
          <div>
            <label>Atendente *</label>
            <input id="atendente" placeholder="Nome do atendente" />
          </div>
        </div>

        <label>Observações</label>
        <textarea id="observacoes" placeholder="Opcional"></textarea>

        <label>Foto/print *</label>
        <input id="file" type="file" accept="image/*" />
        <small>Dica: prints são leves. Foto do celular pode ficar grande e o envio pode falhar por limite do servidor.</small>

        <div class="sticky-actions">
          <button id="sendBtn" onclick="send()">Enviar</button>
          <div id="status" class="status"></div>
        </div>

      </div>
    </div>

    <script>
      // URL do seu Apps Script /exec (com doPost habilitado)
      const API_URL = "https://script.google.com/macros/s/AKfycbxW0Dh4Hy4JdPL6hvh6CiTFdaWWbPFtdHTEnKjy8t5TTepAjOYXlya4PUrimSPu6hc5/exec";

      function setStatus(msg, ok) {
        const el = document.getElementById("status");
        el.className = "status " + (ok ? "ok" : "err");
        el.textContent = msg;
      }

      function toggleOutro() {
        const problema = document.getElementById("problema").value;
        document.getElementById("outroBox").style.display = (problema === "Outro") ? "block" : "none";
      }

      function onlyDigits(s) { return (s || "").replace(/\D+/g, ""); }

      function toBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => {
            const base64 = (reader.result || "").toString().split(",")[1];
            resolve(base64);
          };
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      // ===== Chips sincronizados com dropdown =====
      function clearChipSelection(){
        document.querySelectorAll("#problemChips .chip").forEach(b => b.classList.remove("selected"));
      }

      function selectProblem(value){
        document.getElementById("problema").value = value;
        toggleOutro();

        clearChipSelection();
        const btn = document.querySelector(`#problemChips .chip[data-value="${CSS.escape(value)}"]`);
        if (btn) btn.classList.add("selected");
      }

      document.addEventListener("click", (e) => {
        const btn = e.target.closest("#problemChips .chip");
        if (!btn) return;
        selectProblem(btn.getAttribute("data-value"));
      });

      document.getElementById("problema").addEventListener("change", (e) => {
        const value = e.target.value;
        clearChipSelection();
        if (!value) return;
        const btn = document.querySelector(`#problemChips .chip[data-value="${CSS.escape(value)}"]`);
        if (btn) btn.classList.add("selected");
      });

      async function send() {
        const cpf = onlyDigits(document.getElementById("cpf").value);
        const setorAtendimento = document.getElementById("setorAtendimento").value;
        const socio = document.getElementById("socio").value;
        const tipoIngresso = document.getElementById("tipoIngresso").value;
        const problema = document.getElementById("problema").value;
        const problemaOutroDesc = document.getElementById("problemaOutroDesc").value.trim();
        const resolucao = document.getElementById("resolucao").value;
        const atendente = document.getElementById("atendente").value.trim();
        const observacoes = document.getElementById("observacoes").value.trim();
        const fileInput = document.getElementById("file");
        const btn = document.getElementById("sendBtn");

        if (!cpf || cpf.length !== 11) { setStatus("CPF inválido. Use 11 dígitos.", false); return; }
        if (!setorAtendimento) { setStatus("Selecione o setor de atendimento.", false); return; }
        if (!socio) { setStatus("Informe se o torcedor é sócio.", false); return; }
        if (!tipoIngresso) { setStatus("Selecione o tipo de ingresso.", false); return; }
        if (!problema) { setStatus("Selecione o problema (chip ou dropdown).", false); return; }
        if (problema === "Outro" && !problemaOutroDesc) { setStatus("Descreva o problema (Outro).", false); return; }
        if (!resolucao) { setStatus("Selecione a resolução.", false); return; }
        if (!atendente) { setStatus("Preencha o atendente.", false); return; }
        if (!fileInput.files || fileInput.files.length === 0) { setStatus("Selecione a foto/print.", false); return; }

        const file = fileInput.files[0];

        btn.disabled = true;
        btn.textContent = "Enviando...";

        try {
          const base64Data = await toBase64(file);

          const payload = {
            cpf,
            setorAtendimento,
            socio,
            tipoIngresso,
            problema,
            problemaOutroDesc,
            resolucao,
            atendente,
            observacoes,
            fileName: file.name,
            mimeType: file.type,
            base64Data
          };

          // Truque para reduzir chance de preflight/CORS: text/plain
          const resp = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload)
          });

          let data = null;
          try { data = await resp.json(); } catch(_) {}

          if (data && data.ok === false) {
            setStatus("Erro ao enviar: " + data.message, false);
          } else {
            setStatus((data && data.message) ? data.message : "Enviado ✅ (confira na planilha)", true);
          }

          btn.disabled = false;
          btn.textContent = "Enviar";

          // reset
          document.getElementById("cpf").value = "";
          document.getElementById("socio").value = "";
          document.getElementById("setorAtendimento").value = "";
          document.getElementById("tipoIngresso").value = "";
          document.getElementById("problema").value = "";
          document.getElementById("problemaOutroDesc").value = "";
          document.getElementById("resolucao").value = "";
          document.getElementById("atendente").value = "";
          document.getElementById("observacoes").value = "";
          fileInput.value = "";
          toggleOutro();
          clearChipSelection();
          window.scrollTo({ top: 0, behavior: "smooth" });

        } catch (e) {
          // Se estourar limite do Apps Script, normalmente cai aqui
          setStatus("Falhou ao enviar. Se for foto muito pesada, tente print ou reduza a imagem.", false);
          btn.disabled = false;
          btn.textContent = "Enviar";
        }
      }
    </script>
  </body>
</html>
